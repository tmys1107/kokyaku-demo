<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダッシュボード - Web Studio</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="app-header">
    <div class="app-header-inner">
      <div class="logo">
        <span class="logo-mark">W</span>
        <span>Web Studio</span>
      </div>
      <nav class="nav">
        <a href="dashboard.html" class="active">ダッシュボード</a>
        <a href="menu.html">施策メニュー</a>
        <a href="requests.html">依頼履歴</a>
        <a href="monthly-policy.html">月次方針</a>
        <a href="monthly-report.html">月次レポート</a>
      </nav>
      <div class="user-info">
        <span id="user-name"></span>
        <a href="login.html" class="logout-link">ログアウト</a>
      </div>
    </div>
  </header>

  <main class="main">
    <h1 class="page-title">ようこそ、<span id="welcome-name"></span>さん</h1>
    <p class="page-subtitle" id="welcome-sub"></p>

    <!-- 残チケット残高カード -->
    <div class="balance-card">
      <div class="balance-label">現在の残チケット</div>
      <div class="balance-value" id="balance">— <span class="unit">枚</span></div>
      <div class="balance-sub">
        <span id="plan-info"></span>
        <span id="next-grant"></span>
      </div>
    </div>

    <!-- チケット内訳 -->
    <div class="ticket-breakdown" id="ticket-breakdown"></div>

    <!-- 共有情報パネル -->
    <section class="section">
      <div class="section-head">
        <div class="section-title">共有情報</div>
      </div>
      <div class="info-panel" id="info-panel"></div>
    </section>

    <!-- 今月の依頼 -->
    <section class="section">
      <div class="section-head">
        <div class="section-title">今月の依頼</div>
        <a href="requests.html" style="font-size:0.88rem; color:var(--primary);">すべて見る（月別）→</a>
      </div>
      <div id="recent-requests"></div>
    </section>
  </main>

  <script src="js/mock.js"></script>
  <script>
    const u = MockData.currentUser;
    const t = MockData.tickets;
    document.getElementById('user-name').textContent = u.name;
    document.getElementById('welcome-name').textContent = u.name;
    document.getElementById('welcome-sub').textContent =
      `${u.shopName} の広報サポートダッシュボードです。`;

    // 残高
    document.getElementById('balance').innerHTML = `${t.remaining} <span class="unit">枚</span>`;
    document.getElementById('plan-info').textContent =
      `${u.planLabel}プラン（毎月${u.monthlyTickets}枚付与）`;
    document.getElementById('next-grant').textContent =
      `次回付与：${fmt.date(MockData.nextGrantDate)}`;

    // チケット内訳
    const breakdown = [
      { cls: 'is-grant',  label: '今月の付与',     value: t.granted },
      { cls: 'is-used',   label: '使用済み',       value: t.used },
      { cls: 'is-remain', label: '残チケット',     value: t.remaining },
      { cls: 'is-carry',  label: '先月からの繰越', value: t.carryOver },
      { cls: 'is-expire', label: '失効予定',       value: t.expiring, note: `${fmt.date(t.expireDate)} まで` }
    ];
    document.getElementById('ticket-breakdown').innerHTML = breakdown.map(b => `
      <div class="ticket-stat ${b.cls}">
        <div class="ticket-stat-label">${b.label}</div>
        <div class="ticket-stat-value">${b.value}<span class="unit">枚</span></div>
        ${b.note ? `<div class="ticket-stat-note">${b.note}に失効</div>` : ''}
      </div>
    `).join('');

    // 共有情報
    const ci = MockData.clientInfo;
    document.getElementById('info-panel').innerHTML = `
      <div class="info-row">
        <span class="info-ico">🎥</span>
        <span class="info-label">オンラインMTG</span>
        <span class="info-value"><a href="${ci.mtgUrl}" target="_blank">${ci.mtgUrl}</a></span>
      </div>
      <div class="info-row">
        <span class="info-ico">📁</span>
        <span class="info-label">資料フォルダ</span>
        <span class="info-value"><a href="${ci.driveUrl}" target="_blank">Google Drive を開く</a></span>
      </div>
      <div class="info-row">
        <span class="info-ico">📅</span>
        <span class="info-label">次回打ち合わせ</span>
        <span class="info-value">${ci.nextMtg}</span>
      </div>
      <div class="info-row">
        <span class="info-ico">📝</span>
        <span class="info-label">メモ</span>
        <span class="info-value">${ci.notes}</span>
      </div>
    `;

    // 今月の依頼（6月分）
    const recent = MockData.myRequests.filter(r => r.createdAt.startsWith('2026-06'));
    const list = recent.length ? recent : MockData.myRequests.slice(0, 3);
    document.getElementById('recent-requests').innerHTML = list.map(r => {
      const needs = fmt.needsClientAction(r.status);
      const ticketText = r.confirmedTickets != null
        ? `${r.confirmedTickets}枚（確定）`
        : (r.estTickets != null ? `${r.estTickets}枚（見積）` : '見積もり中');
      return `
      <a href="task.html?id=${r.id}" class="request-card ${needs ? 'needs-action' : ''}" style="display:block;">
        <div class="request-card-head">
          <div>
            ${fmt.statusBadge(r.status)}
            ${needs ? '<span class="action-flag">要対応</span>' : ''}
            <span class="request-card-title" style="margin-left:8px;">${r.menuTitle}</span>
          </div>
          <div class="request-card-meta">
            <span class="request-card-cost">${ticketText}</span> ・ ${fmt.date(r.createdAt)}
          </div>
        </div>
        <div class="request-card-comment">${r.comment}</div>
      </a>`;
    }).join('');
  </script>
</body>
</html>
