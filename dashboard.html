<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダッシュボード - coracco design</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="coracco">

  <header class="c-header">
    <div class="c-header-inner">
      <div class="c-logo">
        <span class="c-logo-mark">C</span>
        <span class="c-brand">coracco design</span>
      </div>
      <div class="c-user">
        <span class="c-user-name">👤 <span id="user-name"></span></span>
        <span class="c-divider-v"></span>
        <a href="login.html" class="c-logout">⤴ ログアウト</a>
      </div>
    </div>
  </header>

  <main class="c-main">

    <!-- メニュー -->
    <nav class="c-nav-card">
      <a class="c-tab active" href="dashboard.html"><span class="c-tab-ico">🏠</span><span>ダッシュボード</span></a>
      <a class="c-tab" href="menu.html"><span class="c-tab-ico">📋</span><span>施策メニュー</span></a>
      <a class="c-tab" href="requests.html"><span class="c-tab-ico">🕘</span><span>依頼履歴</span></a>
      <a class="c-tab" href="monthly-policy.html"><span class="c-tab-ico">🎯</span><span>月次方針</span></a>
      <a class="c-tab" href="monthly-report.html"><span class="c-tab-ico">📊</span><span>月次レポート</span></a>
    </nav>

    <!-- チケットカード -->
    <section class="c-ticket-card">
      <div class="c-ticket-head">
        <span class="c-ticket-ico">🎟️</span>
        <span>現在のチケット</span>
      </div>

      <div class="c-ticket-remain">残り <strong id="t-remain">—</strong> 枚</div>
      <div class="c-ticket-avail" id="t-avail">—</div>

      <div class="c-gauge"><div class="c-gauge-fill" id="t-gauge" style="width:0%"></div></div>

      <div class="c-ticket-divider"></div>

      <div class="c-ticket-bottom">
        <div class="c-plan">👑 <span id="t-plan">—</span></div>
        <div class="c-next">次回付与 <span id="t-next-num">—</span>枚<br><small id="t-next-date">—</small></div>
      </div>

      <div class="c-expire">⚠️ <span id="t-expire">—</span></div>
    </section>

    <!-- 共有情報 -->
    <section>
      <div class="c-sec-head"><span>🔗 共有情報</span></div>
      <div class="c-info-card" id="info-panel"></div>
    </section>

    <!-- 今月の依頼 -->
    <section>
      <div class="c-sec-head">
        <span>📄 今月の依頼</span>
        <a href="requests.html">すべて見る ›</a>
      </div>
      <div id="req-list"></div>
    </section>

  </main>

  <script src="js/mock.js"></script>
  <script>
    const u = MockData.currentUser;
    const t = MockData.tickets;
    const available = t.granted + t.carryOver;   // 今月利用可能
    const used = t.used;

    document.getElementById('user-name').textContent = u.name;

    // チケットカード
    document.getElementById('t-remain').textContent = t.remaining;
    document.getElementById('t-avail').textContent =
      `今月利用可能 ${available}枚（今月付与${t.granted}＋繰越${t.carryOver}）`;
    document.getElementById('t-gauge').style.width =
      `${Math.round(used / available * 100)}%`;
    document.getElementById('t-plan').textContent = `${u.planLabel}プラン`;
    document.getElementById('t-next-num').textContent = u.monthlyTickets;
    document.getElementById('t-next-date').textContent = fmt.date(MockData.nextGrantDate);
    document.getElementById('t-expire').innerHTML =
      `<strong>${t.expiring}枚</strong>が ${fmt.date(t.expireDate)} に失効予定`;

    // 共有情報
    const ci = MockData.clientInfo;
    document.getElementById('info-panel').innerHTML = `
      <div class="c-info-row">
        <span class="c-info-ico">🎥</span>
        <span class="c-info-label">オンラインMTG</span>
        <span class="c-info-val"><a href="${ci.mtgUrl}" target="_blank">${ci.mtgUrl}</a></span>
      </div>
      <div class="c-info-row">
        <span class="c-info-ico">📁</span>
        <span class="c-info-label">資料フォルダ</span>
        <span class="c-info-val"><a href="${ci.driveUrl}" target="_blank">Google Drive を開く</a></span>
      </div>
      <div class="c-info-row">
        <span class="c-info-ico">📅</span>
        <span class="c-info-label">次回打ち合わせ</span>
        <span class="c-info-val">${ci.nextMtg}</span>
      </div>
      <div class="c-info-row">
        <span class="c-info-ico">📝</span>
        <span class="c-info-label">メモ</span>
        <span class="c-info-val">${ci.notes}</span>
      </div>
    `;

    // 今月の依頼（デモ表示）
    const requests = [
      { title: 'LP改善提案のご依頼', status: 'prog', label: '対応中', date: '2026/05/28' },
      { title: 'SEO記事構成案の作成', status: 'done', label: '完了',   date: '2026/05/20' }
    ];
    document.getElementById('req-list').innerHTML = requests.map(r => `
      <a href="requests.html" class="c-req-card">
        <span class="c-req-ico">📄</span>
        <span class="c-req-body">
          <span class="c-req-toprow">
            <span class="c-req-title">${r.title}</span>
            <span class="c-req-date">${r.date}</span>
          </span>
          <span class="c-req-badge ${r.status}">${r.label}</span>
        </span>
        <span class="c-req-arrow">›</span>
      </a>
    `).join('');
  </script>
</body>
</html>
