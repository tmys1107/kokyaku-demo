<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>顧客管理 - Web Studio</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="app-header">
    <div class="app-header-inner">
      <div class="logo">
        <span class="logo-mark">W</span>
        <span>Web Studio <small style="color:var(--text-light);font-weight:normal;">管理画面</small></span>
      </div>
      <nav class="nav">
        <a href="index.html">ダッシュボード</a>
        <a href="customers.html" class="active">顧客</a>
        <a href="requests.html">依頼管理</a>
        <a href="menu.html">メニュー</a>
      </nav>
      <div class="user-info">
        <span>管理者</span>
        <a href="../login.html" class="logout-link">ログアウト</a>
      </div>
    </div>
  </header>

  <main class="main">
    <h1 class="page-title">顧客管理</h1>
    <p class="page-subtitle">契約中の顧客一覧。ポイントの付与や調整を行えます。</p>

    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>顧客名</th>
            <th>メールアドレス</th>
            <th>プラン</th>
            <th>残ポイント</th>
            <th style="width:140px;">操作</th>
          </tr>
        </thead>
        <tbody id="customer-rows"></tbody>
      </table>
    </div>
  </main>

  <!-- ポイント付与モーダル -->
  <div class="modal-backdrop" id="modal">
    <div class="modal">
      <div class="modal-title">ポイント付与・調整</div>

      <div style="background:var(--bg); padding:12px 14px; border-radius:8px; margin-bottom:16px;">
        <div style="font-weight:bold;" id="modal-customer">—</div>
        <div style="font-size:0.85rem; color:var(--text-light);">
          現在の残ポイント：<span id="modal-balance">—</span> pt
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">付与・調整するポイント数</label>
        <input type="number" class="form-input" id="modal-points" value="15" placeholder="例: 15">
        <div class="form-help">マイナス値で減算もできます</div>
      </div>

      <div class="form-group">
        <label class="form-label">理由</label>
        <select class="form-select" id="modal-reason">
          <option>月次付与</option>
          <option>手動調整</option>
          <option>サービス補填</option>
          <option>返還処理</option>
        </select>
      </div>

      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
        <button class="btn btn-primary" onclick="submitGrant()">付与する</button>
      </div>
    </div>
  </div>

  <script src="../js/mock.js"></script>
  <script>
    document.getElementById('customer-rows').innerHTML = MockData.allCustomers.map(c => `
      <tr>
        <td><strong>${c.name}</strong></td>
        <td>${c.email}</td>
        <td><span class="badge badge-plan">${c.planLabel}</span></td>
        <td><strong style="color:var(--primary);">${c.balance} pt</strong></td>
        <td>
          <button class="btn btn-primary btn-sm" onclick="openModal('${c.id}')">ポイント付与</button>
        </td>
      </tr>
    `).join('');

    let selected = null;
    function openModal(id) {
      selected = MockData.allCustomers.find(c => c.id === id);
      document.getElementById('modal-customer').textContent = `${selected.name}様（${selected.planLabel}プラン）`;
      document.getElementById('modal-balance').textContent = selected.balance;
      document.getElementById('modal-points').value = selected.plan === 'standard' ? 15 : 5;
      document.getElementById('modal').classList.add('active');
    }
    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }
    function submitGrant() {
      const pts = document.getElementById('modal-points').value;
      closeModal();
      showToast(`${selected.name}様に ${pts}pt を付与しました（デモ）`);
    }
  </script>
</body>
</html>
