<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理者ダッシュボード - Web Studio</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="app-header">
    <div class="app-header-inner">
      <div class="logo">
        <span class="logo-mark">W</span>
        <span>Web Studio <small style="color:var(--text-light);font-weight:normal;">管理画面</small></span>
      </div>
      <nav class="nav">
        <a href="index.html" class="active">ダッシュボード</a>
        <a href="customers.html">顧客</a>
        <a href="requests.html">依頼管理</a>
        <a href="menu.html">メニュー</a>
        <a href="reviews.html">口コミ</a>
      </nav>
      <div class="user-info">
        <span>管理者</span>
        <a href="../login.html" class="logout-link">ログアウト</a>
      </div>
    </div>
  </header>

  <main class="main">
    <h1 class="page-title">管理者ダッシュボード</h1>
    <p class="page-subtitle">本日の状況をひと目で確認できます。</p>

    <!-- 統計 -->
    <div class="grid-3 section">
      <div class="stat-card">
        <div class="stat-label">登録顧客数</div>
        <div><span class="stat-value" id="cust-count">—</span><span class="stat-unit">名</span></div>
        <div class="stat-sub">アクティブ契約中</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">未処理依頼</div>
        <div><span class="stat-value" id="pending-count" style="color:var(--warning);">—</span><span class="stat-unit">件</span></div>
        <div class="stat-sub">対応が必要な案件</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">対応中の依頼</div>
        <div><span class="stat-value" id="progress-count" style="color:var(--info);">—</span><span class="stat-unit">件</span></div>
        <div class="stat-sub">現在進行中</div>
      </div>
    </div>

    <!-- 新着口コミ通知バナー -->
    <a href="reviews.html" id="review-banner" class="notify-panel section" style="text-decoration:none; cursor:pointer; display:none;">
      <div>
        <div class="np-title">🔔 新着の口コミがあります</div>
        <div class="np-sub" id="review-banner-sub"></div>
      </div>
      <span class="btn btn-primary btn-sm">口コミを見る →</span>
    </a>

    <!-- 最新の依頼 -->
    <section class="section">
      <div class="section-head">
        <div class="section-title">最新の依頼</div>
        <a href="requests.html" style="font-size:0.88rem; color:var(--primary);">すべて見る →</a>
      </div>
      <div id="recent-requests"></div>
    </section>
  </main>

  <script src="../js/mock.js"></script>
  <script>
    document.getElementById('cust-count').textContent = MockData.allCustomers.length;
    document.getElementById('pending-count').textContent =
      MockData.allRequests.filter(r => r.status === 'pending').length;
    document.getElementById('progress-count').textContent =
      MockData.allRequests.filter(r => r.status === 'in_progress').length;

    // 新着口コミバナー
    const unreadReviews = MockData.reviews.filter(r => r.unread);
    if (unreadReviews.length > 0) {
      document.getElementById('review-banner').style.display = 'flex';
      document.getElementById('review-banner-sub').textContent =
        `${unreadReviews.length}件の新着口コミ（${[...new Set(unreadReviews.map(r => r.shop))].join('・')}）`;
    }

    const recent = MockData.allRequests.slice(0, 5);
    document.getElementById('recent-requests').innerHTML = recent.map(r => `
      <div class="request-card">
        <div class="request-card-head">
          <div>
            ${fmt.statusBadge(r.status)}
            <span class="request-card-title" style="margin-left:8px;">${r.menuTitle}</span>
            <span style="color:var(--text-light); font-size:0.88rem; margin-left:8px;">${r.customer}様</span>
          </div>
          <div class="request-card-meta">
            <span class="request-card-cost">${r.estTickets != null ? r.estTickets + '枚（見積）' : '見積もり中'}</span> ・ ${fmt.date(r.createdAt)}
          </div>
        </div>
        <div class="request-card-comment">${r.comment}</div>
      </div>
    `).join('');
  </script>
</body>
</html>
