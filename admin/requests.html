<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>依頼管理 - Web Studio</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="app-header">
    <div class="app-header-inner">
      <div class="logo">
        <span class="logo-mark">W</span>
        <span>Web Studio <small style="color:var(--text-light);font-weight:normal;">管理画面</small></span>
      </div>
      <nav class="nav">
        <a href="index.html">ダッシュボード</a>
        <a href="customers.html">顧客</a>
        <a href="requests.html" class="active">依頼管理</a>
        <a href="menu.html">メニュー</a>
      </nav>
      <div class="user-info">
        <span>管理者</span>
        <a href="../login.html" class="logout-link">ログアウト</a>
      </div>
    </div>
  </header>

  <main class="main">
    <h1 class="page-title">依頼管理</h1>
    <p class="page-subtitle">顧客からの依頼一覧。ステータスを更新できます。</p>

    <div class="filter-pills">
      <button class="filter-pill active" data-status="all">すべて</button>
      <button class="filter-pill" data-status="pending">受付中</button>
      <button class="filter-pill" data-status="in_progress">対応中</button>
      <button class="filter-pill" data-status="completed">完了</button>
      <button class="filter-pill" data-status="cancelled">キャンセル</button>
    </div>

    <div id="request-list"></div>
  </main>

  <script src="../js/mock.js"></script>
  <script>
    let currentFilter = 'all';

    function statusActions(status) {
      switch (status) {
        case 'pending':
          return `
            <button class="btn btn-primary btn-sm" onclick="updateStatus('in_progress')">対応開始</button>
            <button class="btn btn-secondary btn-sm" onclick="updateStatus('cancelled')">キャンセル</button>
          `;
        case 'in_progress':
          return `
            <button class="btn btn-success btn-sm" onclick="updateStatus('completed')">完了にする</button>
            <button class="btn btn-secondary btn-sm" onclick="updateStatus('cancelled')">キャンセル</button>
          `;
        case 'completed':
        case 'cancelled':
          return `<span style="color:var(--text-light); font-size:0.85rem;">対応済み</span>`;
      }
    }

    function render() {
      const list = currentFilter === 'all'
        ? MockData.allRequests
        : MockData.allRequests.filter(r => r.status === currentFilter);
      const container = document.getElementById('request-list');
      if (list.length === 0) {
        container.innerHTML = '<p class="empty-msg">該当する依頼はありません。</p>';
        return;
      }
      container.innerHTML = list.map(r => `
        <div class="request-card">
          <div class="request-card-head">
            <div>
              ${fmt.statusBadge(r.status)}
              <span class="request-card-title" style="margin-left:8px;">${r.menuTitle}</span>
              <span style="color:var(--text-light); font-size:0.88rem; margin-left:8px;">${r.customer}様</span>
            </div>
            <div class="request-card-meta">
              <span class="request-card-cost">${r.cost}pt</span> ・ ${fmt.date(r.createdAt)}
            </div>
          </div>
          <div class="request-card-comment">${r.comment}</div>
          <div class="request-card-actions">${statusActions(r.status)}</div>
        </div>
      `).join('');
    }

    function updateStatus(newStatus) {
      showToast(`ステータスを「${StatusLabels[newStatus]}」に更新しました（デモ）`);
    }

    document.querySelectorAll('.filter-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.status;
        render();
      });
    });

    render();
  </script>
</body>
</html>
