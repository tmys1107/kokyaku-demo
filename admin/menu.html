<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メニュー管理 - coracco design</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="coracco">

  <header class="c-header">
    <div class="c-header-inner">
      <div class="c-logo">
        <span class="c-logo-mark">C</span>
        <span class="c-brand">coracco design <small>管理画面</small></span>
      </div>
      <div class="c-user">
        <span class="c-user-name">👤 管理者</span>
        <span class="c-divider-v"></span>
        <a href="../login.html" class="c-logout">⤴ ログアウト</a>
      </div>
    </div>
  </header>

  <main class="main">
    <nav class="c-nav-card">
      <a class="c-tab" href="index.html"><span class="c-tab-ico">🏠</span><span>ダッシュボード</span></a>
      <a class="c-tab" href="customers.html"><span class="c-tab-ico">👥</span><span>顧客</span></a>
      <a class="c-tab" href="requests.html"><span class="c-tab-ico">📋</span><span>依頼管理</span></a>
      <a class="c-tab active" href="menu.html"><span class="c-tab-ico">🗂️</span><span>メニュー</span></a>
      <a class="c-tab" href="reviews.html"><span class="c-tab-ico">⭐</span><span>口コミ</span></a>
    </nav>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; flex-wrap:wrap; gap:12px;">
      <div>
        <h1 class="page-title" style="margin-bottom:4px;">メニュー管理</h1>
        <p style="color:var(--text-light); font-size:0.95rem;">施策メニューの追加・編集・表示切り替えを行います。</p>
      </div>
      <button class="btn btn-primary" onclick="showToast('新規メニュー追加フォーム（デモ）')">＋ 新規メニュー追加</button>
    </div>

    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>メニュー名</th>
            <th>説明</th>
            <th>目安チケット</th>
            <th>状態</th>
            <th style="width:200px;">操作</th>
          </tr>
        </thead>
        <tbody id="menu-rows"></tbody>
      </table>
    </div>
  </main>

  <script src="../js/mock.js"></script>
  <script>
    document.getElementById('menu-rows').innerHTML = MockData.menuItems.map(m => `
      <tr>
        <td><strong>${m.title}</strong></td>
        <td style="color:var(--text-light); font-size:0.88rem;">${m.description}</td>
        <td><strong style="color:var(--primary);">目安 ${m.estCost} 枚</strong></td>
        <td>
          ${m.active
            ? '<span class="badge badge-completed">表示中</span>'
            : '<span class="badge badge-cancelled">非表示</span>'}
        </td>
        <td>
          <button class="btn btn-secondary btn-sm" onclick="showToast('編集フォーム（デモ）')">編集</button>
          <button class="btn btn-secondary btn-sm" onclick="showToast('${m.active ? "非表示" : "表示"}に切り替えました（デモ）')">
            ${m.active ? '非表示にする' : '表示する'}
          </button>
        </td>
      </tr>
    `).join('');
  </script>
</body>
</html>
