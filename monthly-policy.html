<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>月次方針 - coracco design</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="coracco">

  <header class="c-header">
    <div class="c-header-inner">
      <div class="c-logo">
        <span class="c-logo-mark">C</span>
        <span class="c-brand">coracco design</span>
      </div>
      <div class="c-user">
        <span class="c-user-name">👤 <span id="user-name"></span></span>
        <span class="c-divider-v"></span>
        <a href="login.html" class="c-logout">⤴ ログアウト</a>
      </div>
    </div>
  </header>

  <main class="main" style="max-width: 760px;">
    <nav class="c-nav-card">
      <a class="c-tab" href="dashboard.html"><span class="c-tab-ico">🏠</span><span>ダッシュボード</span></a>
      <a class="c-tab" href="menu.html"><span class="c-tab-ico">📋</span><span>施策メニュー</span></a>
      <a class="c-tab" href="requests.html"><span class="c-tab-ico">🕘</span><span>依頼履歴</span></a>
      <a class="c-tab active" href="monthly-policy.html"><span class="c-tab-ico">🎯</span><span>月次方針</span></a>
      <a class="c-tab" href="monthly-report.html"><span class="c-tab-ico">📊</span><span>月次レポート</span></a>
    </nav>
    <div class="section-head">
      <h1 class="page-title" style="margin:0;">月次方針</h1>
      <span class="badge badge-plan" id="policy-month"></span>
    </div>
    <p class="page-subtitle">今月の広報サポートの方向性を共有します。施策はこの方針に沿ってご提案しています。</p>

    <div class="card" id="policy-card"></div>
  </main>

  <script src="js/mock.js"></script>
  <script>
    document.getElementById('user-name').textContent = MockData.currentUser.name;
    const p = MockData.monthlyPolicy;
    document.getElementById('policy-month').textContent = p.month;

    document.getElementById('policy-card').innerHTML = `
      <div class="policy-block">
        <span class="policy-label">今月の課題</span>
        <div class="policy-body">${p.challenge}</div>
      </div>
      <div class="policy-block">
        <span class="policy-label">今月の方針</span>
        <div class="policy-body">${p.direction}</div>
      </div>
      <div class="policy-block">
        <span class="policy-label">今月のご提案施策</span>
        <ul class="policy-list">
          ${p.proposals.map(x => `<li>${x}</li>`).join('')}
        </ul>
        <a href="menu.html" style="font-size:0.88rem; color:var(--primary);">施策メニューから依頼する →</a>
      </div>
      <div class="policy-block">
        <span class="policy-label">期待する効果</span>
        <div class="policy-body">${p.effect}</div>
      </div>
      ${p.note ? `
      <div class="policy-block">
        <span class="policy-label">補足</span>
        <div class="policy-body">${p.note}</div>
      </div>` : ''}
    `;
  </script>
</body>
</html>
