<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>依頼履歴 - coracco design</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="coracco">

  <header class="c-header">
    <div class="c-header-inner">
      <div class="c-logo">
        <span class="c-logo-mark">C</span>
        <span class="c-brand">coracco design</span>
      </div>
      <div class="c-user">
        <span class="c-user-name">👤 <span id="user-name"></span></span>
        <span class="c-divider-v"></span>
        <a href="login.html" class="c-logout">⤴ ログアウト</a>
      </div>
    </div>
  </header>

  <main class="main">
    <nav class="c-nav-card">
      <a class="c-tab" href="dashboard.html"><span class="c-tab-ico">🏠</span><span>ダッシュボード</span></a>
      <a class="c-tab" href="menu.html"><span class="c-tab-ico">📋</span><span>施策メニュー</span></a>
      <a class="c-tab active" href="requests.html"><span class="c-tab-ico">🕘</span><span>依頼履歴</span></a>
      <a class="c-tab" href="monthly-policy.html"><span class="c-tab-ico">🎯</span><span>月次方針</span></a>
      <a class="c-tab" href="monthly-report.html"><span class="c-tab-ico">📊</span><span>月次レポート</span></a>
    </nav>
    <h1 class="page-title">依頼履歴</h1>
    <p class="page-subtitle">月ごとに依頼内容と進捗を確認できます。カードをタップすると詳細・承認画面が開きます。</p>

    <!-- 月別フィルター -->
    <div class="filter-pills" id="month-pills"></div>

    <div id="request-list"></div>
  </main>

  <script src="js/mock.js"></script>
  <script>
    document.getElementById('user-name').textContent = MockData.currentUser.name;

    // 月キー（YYYY-MM）でグルーピング
    const monthKey = (s) => s.slice(0, 7);
    const monthLabel = (key) => {
      const [y, m] = key.split('-');
      return `${y}年${parseInt(m, 10)}月`;
    };
    const months = [...new Set(MockData.myRequests.map(r => monthKey(r.createdAt)))]
      .sort().reverse();

    let currentMonth = 'all';

    // 月別ピル
    const pills = ['all', ...months];
    document.getElementById('month-pills').innerHTML = pills.map(k => `
      <button class="filter-pill ${k === 'all' ? 'active' : ''}" data-month="${k}">
        ${k === 'all' ? 'すべて' : monthLabel(k)}
      </button>
    `).join('');

    function render() {
      const groups = {};
      MockData.myRequests
        .filter(r => currentMonth === 'all' || monthKey(r.createdAt) === currentMonth)
        .forEach(r => {
          const k = monthKey(r.createdAt);
          (groups[k] = groups[k] || []).push(r);
        });

      const keys = Object.keys(groups).sort().reverse();
      const container = document.getElementById('request-list');
      if (keys.length === 0) {
        container.innerHTML = '<p class="empty-msg">該当する依頼はありません。</p>';
        return;
      }
      container.innerHTML = keys.map(k => `
        <div class="section">
          <div class="section-title" style="font-size:0.95rem; color:var(--text-light); margin-bottom:10px;">${monthLabel(k)}（${groups[k].length}件）</div>
          ${groups[k].map(cardHtml).join('')}
        </div>
      `).join('');
    }

    function cardHtml(r) {
      const needs = fmt.needsClientAction(r.status);
      const ticketText = r.confirmedTickets != null
        ? `${r.confirmedTickets}枚（確定）`
        : (r.estTickets != null ? `${r.estTickets}枚（見積）` : '見積もり中');
      return `
        <a href="task.html?id=${r.id}" class="request-card ${needs ? 'needs-action' : ''}" style="display:block;">
          <div class="request-card-head">
            <div>
              ${fmt.statusBadge(r.status)}
              ${needs ? '<span class="action-flag">要対応</span>' : ''}
              <span class="request-card-title" style="margin-left:8px;">${r.menuTitle}</span>
            </div>
            <div class="request-card-meta">
              <span class="request-card-cost">${ticketText}</span> ・ ${fmt.date(r.createdAt)}
            </div>
          </div>
          <div class="request-card-comment">${r.comment}</div>
        </a>`;
    }

    document.querySelectorAll('.filter-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentMonth = btn.dataset.month;
        render();
      });
    });

    render();
  </script>
</body>
</html>
