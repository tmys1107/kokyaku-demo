<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>依頼履歴 - Web Studio</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="app-header">
    <div class="app-header-inner">
      <div class="logo">
        <span class="logo-mark">W</span>
        <span>Web Studio</span>
      </div>
      <nav class="nav">
        <a href="dashboard.html">ダッシュボード</a>
        <a href="menu.html">作業メニュー</a>
        <a href="requests.html" class="active">依頼履歴</a>
      </nav>
      <div class="user-info">
        <span id="user-name"></span>
        <a href="login.html" class="logout-link">ログアウト</a>
      </div>
    </div>
  </header>

  <main class="main">
    <h1 class="page-title">依頼履歴</h1>
    <p class="page-subtitle">これまでの依頼内容と進捗状況を確認できます。</p>

    <div class="filter-pills">
      <button class="filter-pill active" data-status="all">すべて</button>
      <button class="filter-pill" data-status="pending">受付中</button>
      <button class="filter-pill" data-status="in_progress">対応中</button>
      <button class="filter-pill" data-status="completed">完了</button>
      <button class="filter-pill" data-status="cancelled">キャンセル</button>
    </div>

    <div id="request-list"></div>
  </main>

  <script src="js/mock.js"></script>
  <script>
    document.getElementById('user-name').textContent = MockData.currentUser.name;

    let currentFilter = 'all';

    function render() {
      const list = currentFilter === 'all'
        ? MockData.myRequests
        : MockData.myRequests.filter(r => r.status === currentFilter);

      const container = document.getElementById('request-list');
      if (list.length === 0) {
        container.innerHTML = '<p class="empty-msg">該当する依頼はありません。</p>';
        return;
      }
      container.innerHTML = list.map(r => `
        <div class="request-card">
          <div class="request-card-head">
            <div>
              ${fmt.statusBadge(r.status)}
              <span class="request-card-title" style="margin-left:8px;">${r.menuTitle}</span>
            </div>
            <div class="request-card-meta">
              <span class="request-card-cost">-${r.cost}pt</span> ・ ${fmt.date(r.createdAt)}
            </div>
          </div>
          <div class="request-card-comment">${r.comment}</div>
        </div>
      `).join('');
    }

    document.querySelectorAll('.filter-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.status;
        render();
      });
    });

    render();
  </script>
</body>
</html>
